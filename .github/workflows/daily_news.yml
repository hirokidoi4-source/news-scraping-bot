name: Daily News Bot

on:
  schedule:
    # 毎日 日本時間の朝7:00 (UTC 22:00) に実行
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動で「今すぐ実行」ボタンを押せるようにする設定

jobs:
  run-news-bot:
    runs-on: ubuntu-latest # GitHubのサーバー(Ubuntu)で動かす
    
    steps:
      - name: コードを取得
        uses: actions/checkout@v3

      - name: Pythonをセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 必要なライブラリをインストール
        run: |
          pip install requests beautifulsoup4 python-dotenv

      - name: ニュースボットを実行
        env:
          # ここでさっき登録した秘密の鍵を使う
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python news_bot_final.py
